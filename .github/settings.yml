# Repository settings managed via probot/settings
# https://github.com/apps/settings
#
# This file brings the repository into compliance with the
# petry-projects organization standards:
# https://github.com/petry-projects/.github/blob/main/standards/github-settings.md
#
# Rulesets (managed via GitHub API, not probot/settings):
#   - pr-quality      (id: 14592511) — squash-only, 1 required review, thread resolution
#   - code-quality    (id: 15055268) — required checks: SonarCloud, CodeQL,
#                                       claude-code / claude, TypeScript, Go

repository:
  has_discussions: true
  delete_branch_on_merge: true
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: true
  allow_auto_merge: true
  squash_merge_commit_title: PR_TITLE
  squash_merge_commit_message: COMMIT_MESSAGES

labels:
  - name: security
    color: "e4e669"
    description: Security-related issues and improvements
