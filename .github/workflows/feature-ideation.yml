# ─────────────────────────────────────────────────────────────────────────────
# SOURCE OF TRUTH: petry-projects/.github/standards/workflows/feature-ideation.yml
# Standard:        petry-projects/.github/standards/ci-standards.md#8
# Reusable:        petry-projects/.github/.github/workflows/feature-ideation-reusable.yml
# ─────────────────────────────────────────────────────────────────────────────
#
# ⚠️  TEST BRANCH ONLY — tooling_ref points to PR branch for dry-run testing.
#     Revert uses: and tooling_ref to @v1 before merging to main.
#
name: Feature Research & Ideation (BMAD Analyst)

on:
  schedule:
    - cron: '0 7 * * 5'   # Friday 07:00 UTC
  workflow_dispatch:
    inputs:
      focus_area:
        description: 'Optional focus area'
        required: false
        type: string
      research_depth:
        description: 'Research depth'
        required: false
        default: 'standard'
        type: choice
        options: [quick, standard, deep]
      dry_run:
        description: 'Dry run — log mutations instead of writing Discussions'
        required: false
        default: true
        type: boolean

permissions: {}

concurrency:
  group: feature-ideation
  cancel-in-progress: false

jobs:
  ideate:
    permissions:
      contents: read
      issues: read
      pull-requests: read
      discussions: write
      actions: read
      id-token: write
    uses: petry-projects/.github/.github/workflows/feature-ideation-reusable.yml@feat/feature-ideation-sources-list
    with:
      project_context: |
        Broodly is a field-first beekeeping decision-support app for iOS, Android,
        and web (Expo + React Native / Go GraphQL API on GCP). It serves three
        beekeeper segments — Newbie, Amateur, and Sideliner — with a skill-adaptive
        guidance model that converts hive inspection data and seasonal/local context
        into a prioritised "next best action" queue. Competitors include Beekeeper's
        Companion, ApiaryBook, Hive Tracks, BeePlus, and ApisProtect. Key emerging
        trends: LLM-powered advisory features, low-cost IoT hive sensors
        (weight/temperature/acoustic), and weather-API integrations driving automated
        treatment-timing recommendations. The greenfield codebase has a complete BMAD
        PRD, architecture, and UX specification — no public launch yet.
      tooling_ref: 'feat/feature-ideation-sources-list'
      focus_area: ${{ inputs.focus_area || '' }}
      research_depth: ${{ inputs.research_depth || 'standard' }}
      dry_run: ${{ inputs.dry_run != 'false' }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}