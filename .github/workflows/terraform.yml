name: Terraform

# Runs Terraform plan on PRs and apply on merge to main.
# Uses Workload Identity Federation (set up by bootstrap.yml).

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
  pull_request:
    branches: [main]
    paths:
      - "infra/terraform/**"

permissions:
  contents: read
  id-token: write # Required for WIF
  pull-requests: write # For plan comments

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false # Never cancel in-progress applies

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
    defaults:
      run:
        working-directory: infra/terraform/environments/dev
    steps:
      # Guard: skip all Terraform steps when WIF secrets haven't been bootstrapped yet.
      # Run the Bootstrap workflow (manual dispatch) to create the WIF pool/provider first.
      - name: Check WIF bootstrap prerequisites
        id: prereqs
        working-directory: ${{ github.workspace }}
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          WIF_SA: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          if [ -z "${WIF_PROVIDER}" ] || [ -z "${WIF_SA}" ]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Skipping Terraform — GCP_WORKLOAD_IDENTITY_PROVIDER or GCP_SERVICE_ACCOUNT not configured. Run the Bootstrap workflow first."
          else
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: steps.prereqs.outputs.configured == 'true'

      - name: Authenticate to Google Cloud
        if: steps.prereqs.outputs.configured == 'true'
        id: auth
        continue-on-error: true
        uses: google-github-actions/auth@62cf5bd3e4211a0a0b51f2c6d6a37129d828611d # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Warn on auth failure
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'failure'
        run: echo "::warning::GCP authentication failed — WIF pool/provider may not exist yet. Run the Bootstrap workflow first."

      - name: Set up Terraform
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'success'
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'success'
        run: terraform init

      - name: Terraform Validate
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'success'
        run: terraform validate

      - name: Terraform Plan
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'success'
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment plan on PR
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'success' && github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          TERRAFORM_PLAN: ${{ steps.plan.outputs.stdout }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const plan = (process.env.TERRAFORM_PLAN || '').substring(0, 60000);
            const body = `### Terraform Plan\n\`\`\`\n${plan}\n\`\`\`\n*Plan: ${process.env.PLAN_OUTCOME}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('### Terraform Plan'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Terraform Plan Status
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'success' && steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
