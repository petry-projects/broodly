name: Terraform

# Runs Terraform plan on PRs and apply on merge to main.
# Uses Workload Identity Federation (set up by bootstrap.yml).

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
  pull_request:
    branches: [main]
    paths:
      - "infra/terraform/**"

permissions:
  contents: read
  id-token: write # Required for WIF
  pull-requests: write # For plan comments

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }} # Cancel stale PR plans; never cancel applies on main

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
    defaults:
      run:
        working-directory: infra/terraform/environments/dev
    steps:
      # Guard: skip all Terraform steps when WIF secrets haven't been bootstrapped yet.
      # Run the Bootstrap workflow (manual dispatch) to create the WIF pool/provider first.
      - name: Check WIF bootstrap prerequisites
        id: prereqs
        working-directory: ${{ github.workspace }}
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          WIF_SA: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -z "${WIF_PROVIDER}" ] || [ -z "${WIF_SA}" ] || [ -z "${PROJECT_ID}" ]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Skipping Terraform — GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT, or GCP_PROJECT_ID not configured. Run the Bootstrap workflow first."
          else
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          fi

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        if: steps.prereqs.outputs.configured == 'true'

      - name: Authenticate to Google Cloud
        if: steps.prereqs.outputs.configured == 'true'
        id: auth
        continue-on-error: ${{ github.event_name == 'pull_request' }} # Fail loudly on push; allow bootstrap-in-progress on PRs
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Warn on auth failure
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'failure'
        run: echo "::warning::GCP authentication failed — WIF pool/provider may not exist yet. Run the Bootstrap workflow first."

      - name: Set up Terraform
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'success'
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'success'
        run: terraform init

      - name: Terraform Validate
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'success'
        run: terraform validate

      - name: Terraform Plan
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'success'
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/tfplan.txt; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Comment plan on PR
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'success' && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const fs = require('fs');
            const plan = (fs.existsSync('/tmp/tfplan.txt') ? fs.readFileSync('/tmp/tfplan.txt', 'utf8') : '').substring(0, 60000);
            const body = `### Terraform Plan\n\`\`\`\n${plan}\n\`\`\`\n*Plan: ${process.env.PLAN_OUTCOME}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('### Terraform Plan'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Terraform Plan Status
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'success' && steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: steps.prereqs.outputs.configured == 'true' && steps.auth.outcome == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
