name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type Check
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache-dependency-path: apps/api/go.sum

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          working-directory: apps/api
          # Pin golangci-lint to a release built with Go >= 1.26 so it
          # can read the toolchain pin in apps/api/go.mod (go1.26.2).
          # The action's default is built with Go 1.24 and refuses with:
          #   "the Go language version (go1.24) used to build
          #    golangci-lint is lower than the targeted Go version
          #    (1.26.2)"
          version: v2.11.4

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage
          path: apps/api/coverage.out

      - name: Migration guard
        shell: bash
        run: |
          migrations_dir="migrations"
          if [ ! -d "$migrations_dir" ]; then
            echo "No migrations directory found — skipping migration guard."
            exit 0
          fi

          files=$(ls "$migrations_dir"/*.sql 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "No migration files found — skipping migration guard."
            exit 0
          fi

          errors=0

          # Collect sequence numbers and validate naming
          declare -A up_files
          declare -A down_files
          sequences=()

          for f in $files; do
            basename=$(basename "$f")
            if [[ ! "$basename" =~ ^([0-9]+)_(.*)\.(up|down)\.sql$ ]]; then
              echo "ERROR: Invalid migration filename: $basename"
              echo "  Expected format: NNNN_description.up.sql or NNNN_description.down.sql"
              errors=$((errors + 1))
              continue
            fi

            seq="${BASH_REMATCH[1]}"
            direction="${BASH_REMATCH[3]}"

            if [ "$direction" = "up" ]; then
              up_files["$seq"]="$basename"
            else
              down_files["$seq"]="$basename"
            fi

            if [[ ! " ${sequences[*]} " =~ " $seq " ]]; then
              sequences+=("$seq")
            fi
          done

          # Sort sequences
          IFS=$'\n' sorted=($(sort <<<"${sequences[*]}")); unset IFS

          # Check each sequence has both up and down
          for seq in "${sorted[@]}"; do
            if [ -z "${up_files[$seq]}" ]; then
              echo "ERROR: Migration $seq is missing an .up.sql file"
              errors=$((errors + 1))
            fi
            if [ -z "${down_files[$seq]}" ]; then
              echo "ERROR: Migration $seq is missing a .down.sql file"
              errors=$((errors + 1))
            fi
          done

          # Check sequences are sequential (no gaps)
          prev=""
          for seq in "${sorted[@]}"; do
            if [ -n "$prev" ]; then
              expected=$((10#$prev + 1))
              expected_padded=$(printf "%0${#seq}d" "$expected")
              if [ "$seq" != "$expected_padded" ]; then
                echo "ERROR: Migration sequence gap — expected $expected_padded after $prev, found $seq"
                errors=$((errors + 1))
              fi
            fi
            prev="$seq"
          done

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Migration guard failed with $errors error(s)."
            exit 1
          fi

          echo "Migration guard passed — ${#sorted[@]} migration(s) validated."

      - name: Docker build
        working-directory: .
        run: docker build -f apps/api/Dockerfile -t broodly-api:ci apps/api/

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout (full history)
        # Pin to SHA per Action Pinning Policy (ci-standards.md#action-pinning-policy).
        # Look up current SHA: gh api repos/actions/checkout/git/refs/tags/v4 --jq '.object.sha'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        # Pinned to SHA per Action Pinning Policy (ci-standards.md#action-pinning-policy).
        # Refresh with: gh api repos/gitleaks/gitleaks-action/git/refs/tags/v2 --jq '.object.sha'
        # then dereference if it points at an annotated tag.
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        with:
          args: detect --source . --redact --verbose --exit-code 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Push API image to Artifact Registry (main branch only)
  # ---------------------------------------------------------------------------
  # The Cloud Run service is managed by Terraform (infra/terraform/modules/cloud-run/).
  # This job builds and pushes the image; Terraform references the :latest tag.
  # To deploy a new version: push to main (image pushed here), then run terraform apply.
  #
  # Required GitHub Secrets:
  #   GCP_PROJECT_ID                    — GCP project ID (e.g. broodly-491920)
  #   GCP_WORKLOAD_IDENTITY_PROVIDER    — Full provider resource name:
  #     projects/<number>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
  #   GCP_SERVICE_ACCOUNT               — SA email for WIF (e.g. broodly-ci@broodly-491920.iam.gserviceaccount.com)
  push-api-image:
    name: Push API Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [go]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193 # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push container image
        working-directory: .
        run: |
          IMAGE_BASE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/broodly/api"
          docker build -f apps/api/Dockerfile -t "${IMAGE_BASE}:${{ github.sha }}" -t "${IMAGE_BASE}:latest" apps/api/
          docker push "${IMAGE_BASE}:${{ github.sha }}"
          docker push "${IMAGE_BASE}:latest"
