name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type Check
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"
          cache-dependency-path: apps/api/go.sum

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6
        with:
          working-directory: apps/api

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: go-coverage
          path: apps/api/coverage.out

      - name: Migration guard
        shell: bash
        run: |
          migrations_dir="migrations"
          if [ ! -d "$migrations_dir" ]; then
            echo "No migrations directory found — skipping migration guard."
            exit 0
          fi

          files=$(ls "$migrations_dir"/*.sql 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "No migration files found — skipping migration guard."
            exit 0
          fi

          errors=0

          # Collect sequence numbers and validate naming
          declare -A up_files
          declare -A down_files
          sequences=()

          for f in $files; do
            basename=$(basename "$f")
            if [[ ! "$basename" =~ ^([0-9]+)_(.*)\.(up|down)\.sql$ ]]; then
              echo "ERROR: Invalid migration filename: $basename"
              echo "  Expected format: NNNN_description.up.sql or NNNN_description.down.sql"
              errors=$((errors + 1))
              continue
            fi

            seq="${BASH_REMATCH[1]}"
            direction="${BASH_REMATCH[3]}"

            if [ "$direction" = "up" ]; then
              up_files["$seq"]="$basename"
            else
              down_files["$seq"]="$basename"
            fi

            if [[ ! " ${sequences[*]} " =~ " $seq " ]]; then
              sequences+=("$seq")
            fi
          done

          # Sort sequences
          IFS=$'\n' sorted=($(sort <<<"${sequences[*]}")); unset IFS

          # Check each sequence has both up and down
          for seq in "${sorted[@]}"; do
            if [ -z "${up_files[$seq]}" ]; then
              echo "ERROR: Migration $seq is missing an .up.sql file"
              errors=$((errors + 1))
            fi
            if [ -z "${down_files[$seq]}" ]; then
              echo "ERROR: Migration $seq is missing a .down.sql file"
              errors=$((errors + 1))
            fi
          done

          # Check sequences are sequential (no gaps)
          prev=""
          for seq in "${sorted[@]}"; do
            if [ -n "$prev" ]; then
              expected=$((10#$prev + 1))
              expected_padded=$(printf "%0${#seq}d" "$expected")
              if [ "$seq" != "$expected_padded" ]; then
                echo "ERROR: Migration sequence gap — expected $expected_padded after $prev, found $seq"
                errors=$((errors + 1))
              fi
            fi
            prev="$seq"
          done

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Migration guard failed with $errors error(s)."
            exit 1
          fi

          echo "Migration guard passed — ${#sorted[@]} migration(s) validated."

      - name: Docker build
        working-directory: .
        run: docker build -f apps/api/Dockerfile -t broodly-api:ci apps/api/

  # ---------------------------------------------------------------------------
  # Deploy API to Cloud Run (main branch only)
  # ---------------------------------------------------------------------------
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [go]
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@62cf5bd3e4211a0a0b51f2c6d6a37129d828611d # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a # v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push container image
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/broodly/api"
          docker build -f apps/api/Dockerfile \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            apps/api/
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      # Service name and region must match Terraform cloud-run module config
      # in infra/terraform/environments/dev/main.tf
      - name: Deploy to Cloud Run
        env:
          CLOUD_RUN_SERVICE: broodly-api-dev
          CLOUD_RUN_REGION: us-central1
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --image "us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/broodly/api:${{ github.sha }}" \
            --region "${CLOUD_RUN_REGION}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

  # ---------------------------------------------------------------------------
  # Mobile Web Build (main branch only)
  # ---------------------------------------------------------------------------
  mobile-build:
    name: Mobile Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [typescript]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate required secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          missing=()
          [ -z "${FIREBASE_API_KEY}" ] && missing+=("EXPO_PUBLIC_FIREBASE_API_KEY")
          [ -z "${FIREBASE_PROJECT_ID}" ] && missing+=("EXPO_PUBLIC_FIREBASE_PROJECT_ID")
          [ -z "${API_URL}" ] && missing+=("EXPO_PUBLIC_API_URL")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Run the Bootstrap workflow or scripts/bootstrap-secrets.sh first."
            exit 1
          fi

      - name: Generate .env from secrets
        working-directory: apps/mobile
        run: |
          {
            echo "EXPO_PUBLIC_FIREBASE_USE_EMULATOR=false"
            echo "EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}"
            echo "EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}"
            echo "EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}"
            echo "EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}"
            echo "EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}"
            echo "EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}"
            echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}"
          } > .env

      - name: Expo web export
        working-directory: apps/mobile
        run: npx expo export --platform web

      - name: Upload web build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-build
          path: apps/mobile/dist/
          retention-days: 14
