name: SonarCloud Analysis

permissions: {}

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      EXPO_PUBLIC_FIREBASE_USE_EMULATOR: "true"
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: broodly-dev
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate TypeScript coverage
        run: pnpm run test -- --coverage --coverageReporters=lcov --coverageReporters=text-summary
        continue-on-error: false

      - name: Verify coverage file exists
        run: |
          if [ -f "apps/mobile/coverage/lcov.info" ]; then
            echo "✓ Coverage file found"
            head -5 apps/mobile/coverage/lcov.info
          else
            echo "✗ Coverage file NOT found at apps/mobile/coverage/lcov.info"
            ls -la apps/mobile/coverage/ || echo "Coverage directory does not exist"
            exit 1
          fi

      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
