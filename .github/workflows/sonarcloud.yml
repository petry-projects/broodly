name: SonarCloud Analysis

permissions: {}

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate JS/TS coverage report
        working-directory: apps/mobile
        run: pnpm exec jest --coverage --coverageReporters=lcov --coverageDirectory=coverage
      - name: SonarCloud Scan (attempt 1)
        id: sonar_1
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        continue-on-error: true
      - name: Backoff before retry (attempt 2)
        if: ${{ env.SONAR_TOKEN != '' && steps.sonar_1.outcome == 'failure' }}
        run: sleep 10
      - name: SonarCloud Scan (attempt 2)
        id: sonar_2
        if: ${{ env.SONAR_TOKEN != '' && steps.sonar_1.outcome == 'failure' }}
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        continue-on-error: true
      - name: Backoff before retry (attempt 3)
        if: ${{ env.SONAR_TOKEN != '' && steps.sonar_2.outcome == 'failure' }}
        run: sleep 20
      - name: SonarCloud Scan (attempt 3)
        if: ${{ env.SONAR_TOKEN != '' && steps.sonar_2.outcome == 'failure' }}
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
