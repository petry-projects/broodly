version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "security"
      - "dependencies"
    ignore:
      # These transitive dependencies are constrained to safe versions by the
      # `overrides:` block in pnpm-workspace.yaml, which forces the lockfile to
      # resolve patched versions. Dependabot's security updater does not
      # understand pnpm overrides, so it generates failing update attempts
      # (security_update_not_possible / all_versions_ignored) for these deps.
      #
      # This list MUST mirror the override package names in pnpm-workspace.yaml.
      # The sync is enforced by apps/mobile/__tests__/dependabot-overrides-sync.test.ts.
      - dependency-name: "@babel/core"
      - dependency-name: "@tootallnate/once"
      - dependency-name: "@ungap/structured-clone"
      - dependency-name: "@xmldom/xmldom"
      - dependency-name: "brace-expansion"
      - dependency-name: "form-data"
      - dependency-name: "js-yaml"
      - dependency-name: "lodash"
      - dependency-name: "postcss"
      - dependency-name: "shell-quote"
      - dependency-name: "tmp"
      - dependency-name: "uuid"
      - dependency-name: "ws"

  - package-ecosystem: "gomod"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "security"
      - "dependencies"

  - package-ecosystem: "terraform"
    directory: "/infra/terraform"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "security"
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "security"
      - "dependencies"
