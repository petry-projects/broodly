version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "security"
      - "dependencies"
    ignore:
      # These transitive dependencies are constrained to vulnerable versions by
      # upstream packages that haven't released compatible updates.
      # They are already patched via pnpm.overrides in package.json, which forces
      # the lockfile to resolve safe versions. Dependabot's security updater does
      # not understand pnpm.overrides and generates failing update attempts.
      - dependency-name: "@tootallnate/once"
      - dependency-name: "@xmldom/xmldom"
      - dependency-name: "brace-expansion"
      - dependency-name: "lodash"
      - dependency-name: "postcss"
      - dependency-name: "shell-quote"
      - dependency-name: "tmp"
      - dependency-name: "uuid"
      - dependency-name: "ws"

  - package-ecosystem: "gomod"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "security"
      - "dependencies"

  - package-ecosystem: "terraform"
    directory: "/infra/terraform"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "security"
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "security"
      - "dependencies"
