title = "gitleaks config"

[extend]
# Extend the upstream default ruleset.
useDefault = true

[allowlist]
description = "False-positive suppressions"
paths = [
  # BMAD config manifests store SHA-256 file-integrity checksums in CSV
  # columns; these 64-char hex values are flagged as high-entropy secrets.
  # Only *-manifest.csv files inside _bmad/_config/ are excluded — all other
  # CSV files in the repository remain fully scanned.
  '''(^|/)_bmad/_config/[^/]+-manifest\.csv''',

  # BMAD knowledge files (Markdown only) may reference truncated placeholder
  # tokens for documentation purposes.  Non-Markdown file types within _bmad/
  # (YAML, JSON, Groovy) remain fully scanned.
  '''(^|/)_bmad/.*\.md''',

  # Generated planning-output Markdown docs may reference example tokens or
  # hashes for illustration.  HTML wireframe/prototype files may contain
  # data-URI-encoded assets that trigger entropy rules.
  # Non-Markdown/HTML file types within _bmad-output/ remain fully scanned.
  '''(^|/)_bmad-output/.*\.(md|html)''',
]
